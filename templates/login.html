<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Smart Student Compression System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="text-center mb-4">

    <div class="mb-3">

        <i class="fas fa-cloud-upload-alt fa-4x text-info animate__animated animate__bounceIn"></i>

    </div>

    <h2 class="login-title">

        Smart Student Compression System

    </h2>

    <p class="login-subtitle">

        Secure Login Portal

    </p>

</div>
    <form method="POST">

        <div class="mb-3">

            <label class="form-label">
                Username
            </label>

            <div class="input-group">

                <span class="input-group-text">
                    <i class="fas fa-user"></i>
                </span>

                <input
                    type="text"
                    name="username"
                    class="form-control"
                    placeholder="Enter Username"
                    required>

            </div>

        </div>

        <div class="mb-4">

            <label class="form-label">
                Password
            </label>

            <div class="input-group">

                <span class="input-group-text">
                    <i class="fas fa-lock"></i>
                </span>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Enter Password"
                    required>

            </div>

        </div>

        <button
            type="submit"
            class="btn btn-primary w-100 btn-lg mt-3">

            <i class="fas fa-sign-in-alt"></i>

            Login

        </button>

    </form>

</div>

</body>

</html>
