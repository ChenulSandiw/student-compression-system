<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Smart Student Compression System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    background:linear-gradient(135deg,#5B21B6,#2563EB);

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    overflow:hidden;

}

.login-container{

    width:420px;

    background:rgba(255,255,255,0.15);

    backdrop-filter:blur(18px);

    border-radius:20px;

    padding:40px;

    box-shadow:0 20px 40px rgba(0,0,0,0.25);

    color:white;

}

.login-title{

    text-align:center;

    font-size:32px;

    font-weight:bold;

    margin-bottom:10px;

}

.login-subtitle{

    text-align:center;

    opacity:.8;

    margin-bottom:30px;

}

</style>

</head>

<body>

<div class="login-container animate__animated animate__zoomIn">

    <div class="text-center mb-4">

        <i class="fas fa-cloud-upload-alt"
           style="font-size:60px;color:white;"></i>

        <h2 class="login-title">
            Welcome Back
        </h2>

        <p class="login-subtitle">
            Smart Student Compression System
        </p>

    </div>

    <form method="POST">

        <div class="mb-3">

            <label class="form-label">
                Username
            </label>

            <div class="input-group">

                <span class="input-group-text">
                    <i class="fas fa-user"></i>
                </span>

                <input
                    type="text"
                    name="username"
                    class="form-control"
                    placeholder="Enter Username"
                    required>

            </div>

        </div>

        <div class="mb-4">

            <label class="form-label">
                Password
            </label>

            <div class="input-group">

                <span class="input-group-text">
                    <i class="fas fa-lock"></i>
                </span>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Enter Password"
                    required>

            </div>

        </div>

        <button
            type="submit"
            class="btn btn-primary w-100 btn-lg">

            <i class="fas fa-sign-in-alt"></i>

            Login

        </button>

    </form>

</div>

</body>

</html>
