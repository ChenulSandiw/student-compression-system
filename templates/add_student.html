<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Student</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            margin: 0;
            background: #eef2f7;
            font-family: Arial, sans-serif;
        }

        /* Sidebar */
        .sidebar{
            width: 250px;
            height: 100vh;
            background: linear-gradient(to bottom, #16213e, #0f3460);
            position: fixed;
            padding-top: 30px;
        }

        .sidebar h2{
            color: white;
            text-align: center;
            margin-bottom: 40px;
            font-weight: bold;
        }

        .sidebar a{
            display: block;
            color: white;
            text-decoration: none;
            padding: 15px 25px;
            margin: 8px 15px;
            border-radius: 12px;
            transition: 0.3s;
            font-size: 16px;
        }

        .sidebar a:hover{
            background: rgba(255,255,255,0.15);
            transform: translateX(5px);
        }

        /* Main */
        .main{
            margin-left: 250px;
            padding: 40px;
        }

        .card{
            border: none;
            border-radius: 20px;
        }

        .main-title{
            font-weight: bold;
            color: #16213e;
        }

        /* Inputs */
        .form-control{
            border-radius: 12px;
            padding: 12px;
            border: 1px solid #dcdcdc;
        }

        .form-control:focus{
            box-shadow: none;
            border-color: #1a4b84;
        }

        /* Button */
        .btn-custom{
            background: linear-gradient(135deg, #16213e, #1a4b84);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 12px 28px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-custom:hover{
            background: linear-gradient(135deg, #1a4b84, #2563eb);
            color: white;
            transform: translateY(-2px);
        }

        .upload-box{
            border: 2px dashed #c5c5c5;
            border-radius: 15px;
            padding: 20px;
            background: #f9f9f9;
        }

    </style>

</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">

        <h2>
            Compression System
        </h2>

        <a href="/dashboard">
            🏠 Dashboard
        </a>

        <a href="/add_student">
            ➕ Add Student
        </a>

        <a href="/view_students">
            📂 View Records
        </a>

        <a href="/">
            🚪 Logout
        </a>

    </div>

    <!-- Main -->
    <div class="main">

        <div class="card shadow-sm p-5">

            <!-- Top -->
            <div class="d-flex justify-content-between align-items-center mb-4">

                <div>

                    <h2 class="main-title">
                        Add Student
                    </h2>

                    <p class="text-muted">
                        Upload and compress student records
                    </p>

                </div>

                <a href="/dashboard"
                   class="btn btn-dark">

                   ← Back

                </a>

            </div>

            <!-- Form -->
            <form method="POST"
                  enctype="multipart/form-data">

                <!-- Name -->
                <div class="mb-4">

                    <label class="form-label">
                        Student Name
                    </label>

                    <input type="text"
                           name="name"
                           class="form-control"
                           placeholder="Enter student name"
                           required>

                </div>

                <!-- Email -->
                <div class="mb-4">

                    <label class="form-label">
                        Email Address
                    </label>

                    <input type="email"
                           name="email"
                           class="form-control"
                           placeholder="Enter email address"
                           required>

                </div>

                <!-- Course -->
                <div class="mb-4">

                    <label class="form-label">
                        Course
                    </label>

                    <input type="text"
                           name="course"
                           class="form-control"
                           placeholder="Enter course"
                           required>

                </div>

                <!-- Upload -->
                <div class="mb-4">

                    <label class="form-label">
                        Upload Image
                    </label>

                    <div class="upload-box">

                        <input type="file"
                               name="file"
                               class="form-control"
                               required>

                    </div>

                </div>

                <!-- Button -->
                <button type="submit"
                        class="btn btn-custom">

                    ➕ Add Student

                </button>

            </form>

        </div>

    </div>

</body>
</html>
