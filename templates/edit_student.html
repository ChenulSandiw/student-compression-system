<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Edit Student</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: #eef2f7;
            font-family: Arial, sans-serif;
        }

        .card{
            border: none;
            border-radius: 20px;
        }

        .main-title{
            font-weight: bold;
            color: #16213e;
        }

        .btn-custom{
            background: linear-gradient(135deg, #16213e, #1a4b84);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 10px 20px;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn-custom:hover{
            background: linear-gradient(135deg, #1a4b84, #2563eb);
            color: white;
        }

    </style>

</head>

<body>

    <div class="container mt-5">

        <div class="card shadow-sm p-5">

            <!-- Top -->
            <div class="d-flex justify-content-between align-items-center mb-4">

                <h2 class="main-title">
                    Edit Student
                </h2>

                <a href="/view_students"
                   class="btn-custom">

                   ← Back

                </a>

            </div>

            <!-- Form -->
            <form method="POST">

                <!-- Name -->
                <div class="mb-3">

                    <label class="form-label">
                        Name
                    </label>

                    <input type="text"
                           name="name"
                           class="form-control"
                           value="{{ student[1] }}"
                           required>

                </div>

                <!-- Email -->
                <div class="mb-3">

                    <label class="form-label">
                        Email
                    </label>

                    <input type="email"
                           name="email"
                           class="form-control"
                           value="{{ student[2] }}"
                           required>

                </div>

                <!-- Course -->
                <div class="mb-4">

                    <label class="form-label">
                        Course
                    </label>

                    <input type="text"
                           name="course"
                           class="form-control"
                           value="{{ student[3] }}"
                           required>

                </div>

                <!-- Button -->
                <button type="submit"
                        class="btn-custom">

                    Update Student

                </button>

            </form>

        </div>

    </div>

</body>
</html>
