<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon">☁</div>
            <h2>Smart Student</h2>
            <span>Compression System</span>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-label">Main</div>
            <a href="/dashboard"><span class="nav-icon">🏠</span> Dashboard</a>
            <a href="/add_student"><span class="nav-icon">➕</span> Add Student</a>
            <a href="/view_students" class="active"><span class="nav-icon">👨‍🎓</span> Students</a>
            <div class="nav-label">Tools</div>
            <a href="/analytics"><span class="nav-icon">📊</span> Analytics</a>
            <a href="/export_pdf"><span class="nav-icon">📄</span> Reports</a>
        </nav>
        <div class="sidebar-footer">
            <a href="/"><span class="nav-icon">🚪</span> Logout</a>
        </div>
    </aside>

    <main class="main">

        <div class="topbar anim-fade-in">
            <div class="topbar-left">
                <h1>Edit Student</h1>
                <p>Update student information</p>
            </div>
            <div class="topbar-right">
                <div class="badge-time" id="liveClock">—</div>
                <button class="dark-toggle" onclick="toggleDark()">
                    <span id="darkIcon">🌙</span> Dark Mode
                </button>
            </div>
        </div>

        <div class="page-header anim-slide-up">
            <h1>✏️ Edit Student Record</h1>
            <p>Modify the student's details below</p>
        </div>

        <div class="card-glass form-card anim-slide-up delay-1" style="max-width:640px;">
            <form method="POST" action="/edit_student/{{ student[0] }}">

                <div class="mb-4">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="name" class="form-control"
                           value="{{ student[1] }}" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control"
                           value="{{ student[2] }}" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Course</label>
                    <input type="text" name="course" class="form-control"
                           value="{{ student[3] }}" required>
                </div>

                <div class="d-flex gap-3 mt-4">
                    <button type="submit" class="btn-primary-custom">💾 Save Changes</button>
                    <a href="/view_students" class="btn-secondary-custom">Cancel</a>
                </div>

            </form>
        </div>

    </main>

    <script>
        function updateClock() {
            document.getElementById('liveClock').textContent =
                new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        updateClock(); setInterval(updateClock, 1000);
        function toggleDark() { document.body.classList.toggle('dark'); }
    </script>
</body>
</html>
